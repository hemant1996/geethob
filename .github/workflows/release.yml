name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: geethob-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: geethob-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: geethob-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.artifact }}
      - run: ./dist/${{ matrix.artifact }} --version
        if: matrix.target != 'bun-darwin-x64'  # x64 binary can't run on arm64 runners, vice versa — skip cross-arch
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/geethob-*
          generate_release_notes: true
          draft: false
          prerelease: false

  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true  # Don't fail the release if NPM_TOKEN isn't set yet
